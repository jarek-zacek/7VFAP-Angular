<button matButton type="button" (click)="onClick()">{{ buttonText() }}</button>
<br />
<table
  mat-table
  [dataSource]="usersDataSource()"
  aria-label="Users table"
  class="mat-elevation-z8 users-table"
>
  <ng-container matColumnDef="firstName">
	<th mat-header-cell *matHeaderCellDef>First name</th>
	<td mat-cell *matCellDef="let user">{{ user.firstName }}</td>
  </ng-container>

  <ng-container matColumnDef="lastName">
	<th mat-header-cell *matHeaderCellDef>Last name</th>
	<td mat-cell *matCellDef="let user">{{ user.lastName }}</td>
  </ng-container>

  <ng-container matColumnDef="email">
	<th mat-header-cell *matHeaderCellDef>Email</th>
	<td mat-cell *matCellDef="let user">{{ user.email }}</td>
  </ng-container>

  <ng-container matColumnDef="username">
	<th mat-header-cell *matHeaderCellDef>Username</th>
	<td mat-cell *matCellDef="let user">{{ user.username }}</td>
  </ng-container>

  <ng-container matColumnDef="age">
	<th mat-header-cell *matHeaderCellDef>Age</th>
	<td mat-cell *matCellDef="let user">{{ user.age }}</td>
  </ng-container>

  <ng-container matColumnDef="ordersCount">
	<th mat-header-cell *matHeaderCellDef>Orders</th>
	<td mat-cell *matCellDef="let user">{{ user.orders.length }}</td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
</table>
